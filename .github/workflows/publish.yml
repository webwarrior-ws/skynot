name: Publish Binaries

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  bin-publish:
    # can't use github.ref because of this bug: https://github.com/orgs/community/discussions/27124
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    env:
      HEAD_TAG: ${{ github.event.workflow_run.head_branch }}

    runs-on: ubuntu-latest

    permissions:
      contents: read

      # CRITICAL for provenance
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          # Extract tag version (remove 'v' prefix if present)
          TAG_VERSION="${HEAD_TAG#v}"

          # Get version from package.json
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Git tag version: $TAG_VERSION"
          echo "Package.json version: $PKG_VERSION"

          # Compare versions
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Git tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

          echo "✓ Versions match!"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check NPM version
        run: npm --version

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish skynot to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
