name: Publish Binaries

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  bin-publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          # Extract tag version (remove 'v' prefix if present)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          # Get version from package.json
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Git tag version: $TAG_VERSION"
          echo "Package.json version: $PKG_VERSION"

          # Compare versions
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Git tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

          echo "✓ Versions match!"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish skynot to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
